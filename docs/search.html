<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Project Radar MVP - Ricerca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7f9; color: #1f2933; }
    header { background: #111827; color: white; padding: 24px 30px; }
    header h1 { margin: 0 0 6px 0; font-size: 26px; }
    header p { margin: 0; color: #d1d5db; font-size: 14px; }
    main { padding: 24px 30px; }
    .filters { background: white; border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    label { display: block; font-size: 12px; color: #617083; margin-bottom: 5px; }
    select, input { width: 100%; box-sizing: border-box; border: 1px solid #e5e7eb; border-radius: 9px; padding: 9px; font-size: 14px; background: white; }
    button { border: 0; background: #0f766e; color: white; border-radius: 9px; padding: 10px 12px; font-weight: bold; cursor: pointer; }
    .meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; color: #617083; font-size: 14px; }
    .pill { background: white; border: 1px solid #e5e7eb; border-radius: 999px; padding: 8px 10px; }
    
    
    
    th {
      background: #111827;
      color: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    tr:hover { background: #f3f4f6; }
    .small { color: #617083; font-size: 12px; margin-top: 4px; }
    .warn { color: #92400e; font-weight: bold; }
    a { color: #0f766e; font-weight: bold; text-decoration: none; }
  
    .nowrap { white-space: nowrap; }
    .money { white-space: nowrap; min-width: 88px; }
    .award-col { white-space: nowrap; min-width: 96px; }
    .source-col { white-space: nowrap; min-width: 52px; }

    .oe-line { padding: 0 0 7px 0; margin: 0 0 7px 0; border-bottom: 1px solid #eef2f7; }
    .oe-line:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
    .oe-name { font-weight: bold; overflow-wrap: anywhere; }
    .oe-tax { color: #617083; font-size: 12px; margin-top: 2px; }

  
    /* Desktop/tablet: tabella adattiva, niente fuga verso destra */
    @media (min-width: 761px) {
      

      

      

      th:nth-child(1), td:nth-child(1) { width: 17%; }  /* Progetto */
      th:nth-child(2), td:nth-child(2) { width: 6%; }   /* Filiale */
      th:nth-child(3), td:nth-child(3) { width: 7%; }   /* Segmento */
      th:nth-child(4), td:nth-child(4) { width: 7%; }   /* Regione */
      th:nth-child(5), td:nth-child(5) { width: 7%; }   /* Provincia */
      th:nth-child(6), td:nth-child(6) { width: 7%; }   /* Comune */
      th:nth-child(7), td:nth-child(7) { width: 7%; }   /* Valore */
      th:nth-child(8), td:nth-child(8) { width: 12%; }  /* Committente */
      th:nth-child(9), td:nth-child(9) { width: 23%; }  /* Aggiudicatario */
      th:nth-child(10), td:nth-child(10) { width: 7%; } /* Aggiudicazione */
      th:nth-child(11), td:nth-child(11) { width: 4%; } /* Fonte */

      .contractors-col {
        min-width: 0 !important;
        max-width: none !important;
      }

      .money,
      .award-col,
      .source-col {
        white-space: nowrap;
      }

      .oe-line {
        overflow-wrap: anywhere;
      }
    }

  
    /* Rifinitura desktop: font pi? piccolo e colonne pi? leggibili */
    @media (min-width: 761px) {
      

      th {
        white-space: nowrap;
        overflow-wrap: normal !important;
        word-break: normal !important;
      }

      td {
        overflow-wrap: anywhere;
      }

      .small,
      .oe-tax {
        font-size: 10.5px !important;
        line-height: 1.2;
      }

      .oe-line {
        padding-bottom: 5px !important;
        margin-bottom: 5px !important;
      }

      .contractors-col {
        min-width: 300px !important;
        max-width: 420px !important;
      }

      .money {
        white-space: nowrap !important;
        min-width: 82px !important;
      }

      .award-col {
        white-space: nowrap !important;
        min-width: 92px !important;
      }

      .source-col,
      th:last-child,
      td:last-child {
        white-space: nowrap !important;
        min-width: 58px !important;
        width: 58px !important;
        overflow-wrap: normal !important;
        word-break: normal !important;
      }
    }

  
    /* === ALAYAN RECORD TABLE STANDARD === */
    .table-wrap {
      max-height: calc(100vh - 300px);
      min-height: 420px;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      background: #ffffff;
      border: 1px solid #1f2937;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    table {
      width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
    }

    th, td {
      font-size: 10px;
      padding: 5px 4px;
      vertical-align: top;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.18;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 20;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 30;
      background: #111827;
      color: #ffffff;
      box-shadow: 0 2px 0 #374151;
    }

    tbody td {
      background: #ffffff;
    }

    .source-link,
    a {
      color: #00796b;
      font-weight: 700;
      text-decoration: none;
    }
    /* === /ALAYAN RECORD TABLE STANDARD === */

  
    /* === SEARCH READABILITY FIX === */
    th, td {
      font-size: 11px !important;
      border-bottom: 1px solid #d7dde5 !important;
    }

    tbody tr:nth-child(even) td {
      background: #f8fafc !important;
    }

    tbody tr:nth-child(odd) td {
      background: #ffffff !important;
    }

    tbody tr:hover td {
      background: #eef6f5 !important;
    }
    /* === /SEARCH READABILITY FIX === */

  
    /* === OE SEPARATOR FIX === */
    .oe-line {
      padding: 4px 0 5px 0;
      border-bottom: 1px solid #cbd5e1;
    }

    .oe-line:last-child {
      border-bottom: 0;
    }

    .oe-name {
      font-weight: 700;
    }

    .oe-tax {
      color: #475569;
      font-size: 10px;
      margin-top: 2px;
    }
    /* === /OE SEPARATOR FIX === */

  
    /* === SEARCH FEATURES: BADGE / SORT / EXPORT === */
    .source-badge {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .02em;
      vertical-align: middle;
    }

    .source-badge.anac {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #10b981;
    }

    .source-badge.opencup {
      background: #e5e7eb;
      color: #374151;
      border: 1px solid #9ca3af;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    

    

    

    .export-btn {
      margin-left: 8px;
      background: #f97316;
      color: #ffffff;
    }

    .export-btn:hover {
      background: #ea580c;
    }
    /* === /SEARCH FEATURES: BADGE / SORT / EXPORT === */

  
    /* === SORT INDICATORS FIX - NO UNICODE === */
    th.sortable {
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    th.sortable::after {
      content: "";
      display: inline-block;
      margin-left: 5px;
      vertical-align: middle;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid rgba(255,255,255,.55);
    }

    th.sort-asc::after {
      border-top: 0;
      border-bottom: 6px solid #ffffff;
    }

    th.sort-desc::after {
      border-top: 6px solid #ffffff;
      border-bottom: 0;
    }
    /* === /SORT INDICATORS FIX - NO UNICODE === */

  
    .details-btn {
      margin-top: 4px;
      padding: 3px 7px;
      border: 0;
      border-radius: 8px;
      background: #374151;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .award-detail-row td {
      background: #f8fafc !important;
      border-top: 1px solid #94a3b8;
      border-bottom: 1px solid #94a3b8;
      padding: 8px;
    }

    .award-item {
      padding: 6px 0;
      border-bottom: 1px solid #cbd5e1;
    }

    .tax-list {
      color: #475569;
      font-size: 10px;
      margin-top: 2px;
    }

</style>
</head>
<body>
  <header>
    <h1>Project Radar MVP - Ricerca</h1>
    <p>Filtro rapido su progetti, filiali, committenti e aggiudicatari ANAC.</p>
  </header>

  <main>
    <section class="filters">
      <div><label>Filiale</label><select id="branch"></select></div>
      <div><label>Regione</label><select id="region"></select></div>
      <div><label>Provincia</label><select id="province"></select></div>
      <div><label>Comune</label><select id="municipality"></select></div>
      <div><label>Segmento Alayan</label><select id="segment"></select></div>
      <div><label>Valore min. progetto</label><input id="valueMin" type="number" min="0" step="100000" placeholder="es. 1000000"></div>
      <div><label>Valore max. progetto</label><input id="valueMax" type="number" min="0" step="100000" placeholder="es. 20000000"></div>
      <div><label>Data aggiud. da</label><input id="dateFrom" type="date"></div>
      <div><label>Data aggiud. a</label><input id="dateTo" type="date"></div>
      <div><label>Testo libero</label><input id="q" placeholder="progetto, committente, aggiudicatario, CUP, CIG"></div>
      <div><label>&nbsp;</label><button onclick="resetFilters()">Reset</button><button class="export-btn" onclick="exportFilteredCsv()">Export CSV</button></div>
    </section>

    <section class="meta">
      <div class="pill" id="total"></div>
      <div class="pill" id="shown"></div>
      <div class="pill">Vista limitata ai primi 300 risultati filtrati</div>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-sort="title" onclick="setSort('title')">Progetto</th>
            <th class="sortable" data-sort="branch" onclick="setSort('branch')">Filiale</th>
            <th class="sortable" data-sort="segment" onclick="setSort('segment')">Segmento</th>
            <th class="sortable" data-sort="region" onclick="setSort('region')">Regione</th>
            <th class="sortable" data-sort="province" onclick="setSort('province')">Provincia</th>
            <th class="sortable" data-sort="municipality" onclick="setSort('municipality')">Comune</th>
            <th class="sortable" data-sort="project_value" onclick="setSort('project_value')">Valore</th>
            <th class="sortable" data-sort="client" onclick="setSort('client')">Committente</th>
            <th class="sortable" data-sort="contractors" onclick="setSort('contractors')">Aggiudicatario / OE</th>
            <th class="sortable" data-sort="award_date" onclick="setSort('award_date')">Aggiudicazione</th>
            <th class="sortable source-col" data-sort="source_url" onclick="setSort('source_url')">Fonte</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

<script>
let records = [];
let branchTerritory = {};
let filtered = [];
let sortKey = "project_value";
let sortDir = "desc";

const els = {
  branch: document.getElementById("branch"),
  region: document.getElementById("region"),
  province: document.getElementById("province"),
  municipality: document.getElementById("municipality"),
  segment: document.getElementById("segment"),
  valueMin: document.getElementById("valueMin"),
  valueMax: document.getElementById("valueMax"),
  dateFrom: document.getElementById("dateFrom"),
  dateTo: document.getElementById("dateTo"),
  q: document.getElementById("q"),
  tbody: document.getElementById("tbody"),
  total: document.getElementById("total"),
  shown: document.getElementById("shown")
};

function euro(value) {
  if (!value) return "";
  return Number(value).toLocaleString("it-IT", { maximumFractionDigits: 0 }) + " &euro;";
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}



function clean(v) {
  if (v === null || v === undefined) return "";
  return String(v).trim();
}

function splitPipe(value) {
  return String(value || "")
    .split("|")
    .map(x => x.trim())
    .filter(Boolean);
}

function pairedContractors(namesValue, taxValue) {
  const names = splitPipe(namesValue);
  const taxes = splitPipe(taxValue);

  if (!names.length) return "";

  return names.map((name, i) => {
    const tax = taxes[i] || "";
    return `
      <div class="oe-line">
        <div class="oe-name">${escapeHtml(name)}</div>
        ${tax ? `<div class="oe-tax">${escapeHtml(tax)}</div>` : ""}
      </div>
    `;
  }).join("");
}

function optionList(values) {
  return ["", ...Array.from(new Set(values.filter(Boolean))).sort()];
}

function fillSelect(select, values, label) {
  const current = select.value;
  select.innerHTML = "";
  for (const v of values) {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v || label;
    select.appendChild(opt);
  }
  if (values.includes(current)) select.value = current;
}

function recordBranchList(r) {
  const values = [];

  if (r.branch && r.branch !== "AMBIGUA" && r.branch !== "NON ASSEGNATA") {
    values.push(r.branch);
  }

  if (r.branch_candidates) {
    for (const b of r.branch_candidates.split("|").map(x => x.trim()).filter(Boolean)) {
      values.push(b);
    }
  }

  return Array.from(new Set(values));
}

function branchLabel(r) {
  if (r.branch === "AMBIGUA") {
    return `<span class="warn">AMBIGUA</span><div class="small">${escapeHtml(r.branch_candidates)}</div>`;
  }

  if (r.branch === "NON ASSEGNATA") {
    return `<span class="warn">NON ASSEGNATA</span>`;
  }

  return escapeHtml(r.branch);
}

function populateFilters() {
  const allBranches = [];
  for (const r of records) {
    for (const b of recordBranchList(r)) allBranches.push(b);
  }

  fillSelect(els.branch, optionList(allBranches), "Tutte");
  fillSelect(els.segment, optionList(records.map(r => r.segment)), "Tutti");
  updateDependentFilters();
}

function updateDependentFilters() {
  const branch = els.branch.value;

  let territorySubset = null;

  if (branch && branchTerritory[branch]) {
    territorySubset = branchTerritory[branch];
  }

  // Se c'? una filiale, i menu geografici vengono dalla competenza territoriale.
  // Se non c'? filiale, vengono dai record disponibili.
  const regionSource = territorySubset || records;

  fillSelect(els.region, optionList(regionSource.map(r => r.region)), "Tutte");

  const region = els.region.value;

  let provinceSource = regionSource;
  if (region) {
    provinceSource = provinceSource.filter(r => r.region === region);
  }

  fillSelect(els.province, optionList(provinceSource.map(r => r.province)), "Tutte");

  const province = els.province.value;

  let municipalitySource = regionSource;
  if (region) {
    municipalitySource = municipalitySource.filter(r => r.region === region);
  }
  if (province) {
    municipalitySource = municipalitySource.filter(r => r.province === province);
  }

  fillSelect(els.municipality, optionList(municipalitySource.map(r => r.municipality)), "Tutti");
}

function applyFilters() {
  const branch = els.branch.value;
  const region = els.region.value;
  const province = els.province.value;
  const municipality = els.municipality.value;
  const segment = els.segment.value;
  const valueMin = Number(els.valueMin.value || 0);
  const valueMax = Number(els.valueMax.value || 0);
  const dateFrom = els.dateFrom.value;
  const dateTo = els.dateTo.value;
  const q = els.q.value.trim().toLowerCase();

  filtered = records.filter(r => {
    if (branch && !recordBranchList(r).includes(branch)) return false;
    if (region && r.region !== region) return false;
    if (province && r.province !== province) return false;
    if (municipality && r.municipality !== municipality) return false;
    if (segment && r.segment !== segment) return false;

    if (valueMin && Number(r.project_value || 0) < valueMin) return false;
    if (valueMax && Number(r.project_value || 0) > valueMax) return false;

    if (dateFrom && (!r.award_date || r.award_date < dateFrom)) return false;
    if (dateTo && (!r.award_date || r.award_date > dateTo)) return false;

    if (q) {
      const blob = [
        r.title, r.client, r.contractors, r.contractor_tax_codes,
        r.cup, r.cig, r.municipality, r.province, r.region,
        r.branch, r.branch_candidates
      ].join(" ").toLowerCase();
      if (!blob.includes(q)) return false;
    }

    return true;
  });

  render();
}


function hasAnacData(r) {
  return Boolean(
    clean(r.cig) ||
    clean(r.contractors) ||
    clean(r.contractor_name) ||
    clean(r.award_date) ||
    clean(r.award_result)
  );
}

function sourceBadgeHtml(r) {
  return hasAnacData(r)
    ? '<span class="source-badge anac">ANAC</span>'
    : '<span class="source-badge opencup">OpenCUP</span>';
}

function parseNum(v) {
  if (v === null || v === undefined) return 0;
  if (typeof v === "number") return v;
  const n = Number(String(v).replace(/[^\d,.-]/g, "").replace(/\./g, "").replace(",", "."));
  return Number.isFinite(n) ? n : 0;
}

function sortValue(r, key) {
  if (key === "project_value") return Number(r.project_value || 0);
  if (key === "award_date") return clean(r.award_date);
  return clean(r[key]);
}


function setSort(key) {
  if (sortKey === key) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortKey = key;
    sortDir = (key === "project_value" || key === "award_date") ? "desc" : "asc";
  }

  updateSortHeaders();
  render();
}

function sortedFiltered() {
  const arr = [...filtered];
  arr.sort((a, b) => {
    const av = sortValue(a, sortKey);
    const bv = sortValue(b, sortKey);

    if (typeof av === "number" && typeof bv === "number") {
      return sortDir === "asc" ? av - bv : bv - av;
    }

    return sortDir === "asc"
      ? String(av).localeCompare(String(bv), "it", { sensitivity: "base" })
      : String(bv).localeCompare(String(av), "it", { sensitivity: "base" });
  });
  return arr;
}

function updateSortHeaders() {
  document.querySelectorAll("th.sortable").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.sort === sortKey) {
      th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
    }
  });
}

function exportFilteredCsv() {
  const rows = prSortedFiltered();

  if (!rows.length) {
    alert("Nessun record da esportare.");
    return;
  }

  const cols = [
    ["Progetto", r => clean(r.title)],
    ["Filiale", r => clean(r.branch)],
    ["Segmento", r => clean(r.segment)],
    ["Regione", r => clean(r.region)],
    ["Provincia", r => clean(r.province)],
    ["Comune", r => clean(r.municipality)],
    ["Valore progetto", r => clean(r.project_value)],
    ["Committente", r => clean(r.client)],
    ["Aggiudicatario / OE", r => clean(r.contractors)],
    ["Data aggiudicazione", r => clean(r.award_date)],
    ["Esito", r => clean(r.award_result)],
    ["Importo aggiudicazione", r => clean(r.award_amount_eur)],
    ["Peso affidamento", r => clean(r.award_weight)],
    ["CUP", r => clean(r.cup)],
    ["CIG", r => clean(r.cig)],
    ["Fonte", r => clean(r.source_url)]
  ];

  const esc = v => '"' + String(v ?? "").replaceAll('"', '""') + '"';
  const csv = [
    cols.map(c => esc(c[0])).join(";"),
    ...rows.map(r => cols.map(c => esc(c[1](r))).join(";"))
  ].join("\r\n");

  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "project_radar_risultati_filtrati.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function decorateBadges() {
  document.querySelectorAll("tbody tr").forEach(tr => {
    if (tr.querySelector(".source-badge")) return;
    const firstCell = tr.querySelector("td");
    if (!firstCell) return;

    const isAnac = tr.textContent.includes("CIG:") || tr.textContent.includes("AGGIUDICATA");
    const badge = document.createElement("span");
    badge.className = "source-badge " + (isAnac ? "anac" : "opencup");
    badge.textContent = isAnac ? "ANAC" : "OpenCUP";
    firstCell.appendChild(document.createElement("br"));
    firstCell.appendChild(badge);
  });
}



function prSortValue(r, key) {
  if (key === "project_value") {
    return Number(r.project_value || 0);
  }

  if (key === "award_date") {
    const d = clean(r.award_date);
    return d ? d : "";
  }

  return clean(r[key]).toLowerCase();
}

function prSortedFiltered() {
  return [...filtered].sort((a, b) => {
    const av = prSortValue(a, sortKey);
    const bv = prSortValue(b, sortKey);

    if (typeof av === "number" && typeof bv === "number") {
      return sortDir === "asc" ? av - bv : bv - av;
    }

    const cmp = String(av).localeCompare(String(bv), "it", {
      sensitivity: "base",
      numeric: true
    });

    return sortDir === "asc" ? cmp : -cmp;
  });
}

function setSort(key) {
  if (sortKey === key) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortKey = key;
    sortDir = (key === "project_value" || key === "award_date") ? "desc" : "asc";
  }

  updateSortHeaders();
  render();
}



function contractorsPreviewHtml(r) {
  const names = [];

  if (Array.isArray(r.awards)) {
    for (const a of r.awards) {
      for (const name of splitPipe(a.contractors || "")) {
        if (name && !names.includes(name)) names.push(name);
      }
    }
  }

  if (!names.length) {
    for (const name of splitPipe(r.contractors || r.contractors_summary || "")) {
      if (name && !names.includes(name)) names.push(name);
    }
  }

  const shown = names.slice(0, 3);
  const extra = Math.max(0, names.length - shown.length);

  return `
    ${shown.map(x => `<div class="oe-line"><div class="oe-name">${escapeHtml(x)}</div></div>`).join("")}
    ${extra ? `<div class="small"><strong>+ altri ${extra} OE</strong></div>` : ""}
  `;
}

function awardsOeWithTaxHtml(a) {
  const names = splitPipe(a.contractors || "");
  const taxes = splitPipe(a.contractor_tax_codes || "");

  return names.map((name, i) => {
    const tax = taxes[i] || "";
    return `
      <div>
        <strong>${escapeHtml(name)}</strong>
        ${tax ? `<div class="tax-list">P.IVA / CF: ${escapeHtml(tax)}</div>` : ""}
      </div>
    `;
  }).join("");
}

function awardsDetailHtml(r) {
  const awards = Array.isArray(r.awards) ? r.awards : [];
  if (!awards.length) return "";

  return `
    <strong>Dettaglio affidamenti ANAC (${awards.length})</strong>
    ${awards.map(a => `
      <div class="award-item">
        <div><strong>CIG:</strong> ${escapeHtml(a.cig || "")}</div>
        <div><strong>OE:</strong>${awardsOeWithTaxHtml(a)}</div>
        <div class="small">
          Data: ${escapeHtml(a.award_date || "")}
          ${a.award_result ? " - Esito: " + escapeHtml(a.award_result) : ""}
          ${a.award_amount_eur ? " ? Importo: " + euro(a.award_amount_eur) : ""}
        </div>
      </div>
    `).join("")}
  `;
}

function toggleAwards(rowId) {
  const el = document.getElementById(rowId);
  if (!el) return;
  el.style.display = el.style.display === "none" ? "table-row" : "none";
}

function render() {
  const maxRows = 300;
  const rows = prSortedFiltered().slice(0, maxRows);

  els.total.textContent = "Record totali: " + records.length;
  els.shown.textContent = "Risultati filtrati: " + filtered.length + " - mostrati: " + rows.length;

  els.tbody.innerHTML = rows.map(r => `
    <tr>
      <td>
        <strong>${escapeHtml(r.title)}</strong>
        <div class="small">CUP: ${escapeHtml(r.cup)} - CIG: ${escapeHtml(r.cig)}</div>
      </td>

      <td>${branchLabel(r)}</td>

      <td>${escapeHtml(r.segment)}</td>

      <td>${escapeHtml(r.region)}</td>

      <td>${escapeHtml(r.province)}</td>

      <td>${escapeHtml(r.municipality)}</td>

      <td class="money">${euro(r.project_value)}</td>

      <td>${escapeHtml(r.client)}</td>

      <td class="contractors-col">
        ${contractorsPreviewHtml(r)}
        ${r.awards_count ? `<div><button class="details-btn" onclick="toggleAwards('awards-${r.cup}')">Dettagli ANAC (${r.awards_count})</button></div>` : ""}
      </td>

      <td class="award-col">
        ${escapeHtml(r.award_date)}
        <div class="small">${escapeHtml(r.award_result)}</div>
      </td>

      <td class="source-col">
        <a href="${escapeHtml(r.source_url)}" target="_blank">Fonte</a>
      </td>
    </tr>
    ${r.awards_count ? `
      <tr id="awards-${escapeHtml(r.cup)}" class="award-detail-row" style="display:none;">
        <td colspan="11">${awardsDetailHtml(r)}</td>
      </tr>
    ` : ""}
  `).join("");
  decorateBadges();
  updateSortHeaders();
}


function setSelectIfPresent(select, value) {
  if (!value) return;

  const decoded = decodeURIComponent(value).trim();
  if (!decoded) return;

  const options = Array.from(select.options);
  const found = options.find(o => o.value.toLowerCase() === decoded.toLowerCase());

  if (found) {
    select.value = found.value;
  }
}

function applyUrlParams() {
  const params = new URLSearchParams(window.location.search);

  const branch = params.get("branch");
  const region = params.get("region");
  const province = params.get("province");
  const municipality = params.get("municipality");
  const segment = params.get("segment");

  const valueMin = params.get("valueMin");
  const valueMax = params.get("valueMax");
  const dateFrom = params.get("dateFrom");
  const dateTo = params.get("dateTo");
  const q = params.get("q");

  // Ordine importante:
  // branch -> aggiorna territori
  // region -> aggiorna province/comuni
  // province -> aggiorna comuni
  setSelectIfPresent(els.branch, branch);
  updateDependentFilters();

  setSelectIfPresent(els.region, region);
  updateDependentFilters();

  setSelectIfPresent(els.province, province);
  updateDependentFilters();

  setSelectIfPresent(els.municipality, municipality);
  setSelectIfPresent(els.segment, segment);

  if (valueMin) els.valueMin.value = valueMin;
  if (valueMax) els.valueMax.value = valueMax;
  if (dateFrom) els.dateFrom.value = dateFrom;
  if (dateTo) els.dateTo.value = dateTo;
  if (q) els.q.value = decodeURIComponent(q);
}

function resetFilters() {
  els.branch.value = "";
  els.region.value = "";
  els.province.value = "";
  els.municipality.value = "";
  els.segment.value = "";
  els.valueMin.value = "";
  els.valueMax.value = "";
  els.dateFrom.value = "";
  els.dateTo.value = "";
  els.q.value = "";
  updateDependentFilters();
  applyFilters();
}

els.branch.addEventListener("change", () => {
  updateDependentFilters();
  applyFilters();
});
els.region.addEventListener("change", () => { updateDependentFilters(); applyFilters(); });
els.province.addEventListener("change", () => { updateDependentFilters(); applyFilters(); });
els.municipality.addEventListener("change", applyFilters);
els.segment.addEventListener("change", applyFilters);
els.valueMin.addEventListener("input", applyFilters);
els.valueMax.addEventListener("input", applyFilters);
els.dateFrom.addEventListener("input", applyFilters);
els.dateTo.addEventListener("input", applyFilters);
els.q.addEventListener("input", applyFilters);

Promise.all([
  fetch("data/master_projects.json").then(r => r.json()),
  fetch("data/branch_territory.json").then(r => r.json())
])
  .then(([data, territory]) => {
    records = data;
    branchTerritory = territory;
    filtered = data;
    populateFilters();
    applyUrlParams();
    applyFilters();
  })
  .catch(err => {
    els.tbody.innerHTML = `<tr><td colspan="11">Errore caricamento dati: ${escapeHtml(err)}</td></tr>`;
  });






</script>
</body>
</html>
