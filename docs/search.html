<script>
let records = [];
let branchTerritory = {};
let filtered = [];
let currentPage = 1;
const pageSize = 300;
let sortKey = "project_value";
let sortDir = "desc";

const els = {
  branch: document.getElementById("branch"),
  region: document.getElementById("region"),
  province: document.getElementById("province"),
  municipality: document.getElementById("municipality"),
  segment: document.getElementById("segment"),
  contractorFilter: document.getElementById("contractorFilter"),
  changeFilter: document.getElementById("changeFilter"),
  valueMin: document.getElementById("valueMin"),
  valueMax: document.getElementById("valueMax"),
  dateFrom: document.getElementById("dateFrom"),
  dateTo: document.getElementById("dateTo"),
  q: document.getElementById("q"),
  tbody: document.getElementById("tbody"),
  total: document.getElementById("total"),
  shown: document.getElementById("shown")
};

function euro(value) {
  if (!value) return "";
  return Number(value).toLocaleString("it-IT", { maximumFractionDigits: 0 }) + " &euro;";
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}



function clean(v) {
  if (v === null || v === undefined) return "";
  return String(v).trim();
}

function splitPipe(value) {
  return String(value || "")
    .split("|")
    .map(x => x.trim())
    .filter(Boolean);
}

function pairedContractors(namesValue, taxValue) {
  const names = splitPipe(namesValue);
  const taxes = splitPipe(taxValue);

  if (!names.length) return "";

  return names.map((name, i) => {
    const tax = taxes[i] || "";
    return `
      <div class="oe-line">
        <div class="oe-name">${escapeHtml(name)}</div>
        ${tax ? `<div class="oe-tax">${escapeHtml(tax)}</div>` : ""}
      </div>
    `;
  }).join("");
}

function optionList(values) {
  return ["", ...Array.from(new Set(values.filter(Boolean))).sort()];
}

function fillSelect(select, values, label) {
  const current = select.value;
  select.innerHTML = "";
  for (const v of values) {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v || label;
    select.appendChild(opt);
  }
  if (values.includes(current)) select.value = current;
}

function recordBranchList(r) {
  const values = [];

  if (r.branch === "AMBIGUA") {
    values.push("AMBIGUA");
  } else if (r.branch === "NON ASSEGNATA") {
    values.push("NON ASSEGNATA");
  } else if (r.branch) {
    values.push(r.branch);
  }

  if (r.branch_candidates) {
    for (const b of r.branch_candidates.split("|").map(x => x.trim()).filter(Boolean)) {
      values.push(b);
    }
  }

  return [...new Set(values)];
}

function branchLabel(r) {
  if (r.branch === "AMBIGUA") {
    return `<span class="warn">AMBIGUA</span><div class="small">${escapeHtml(r.branch_candidates)}</div>`;
  }

  if (r.branch === "NON ASSEGNATA") {
    return `<span class="warn">NON ASSEGNATA</span>`;
  }

  return escapeHtml(r.branch);
}

function populateFilters() {
  const allBranches = [];
  for (const r of records) {
    for (const b of recordBranchList(r)) allBranches.push(b);
  }

  fillSelect(els.branch, optionList(allBranches), "Tutte");
  fillSelect(els.segment, optionList(records.map(r => r.segment)), "Tutti");
  updateDependentFilters();
}

function updateDependentFilters() {
  const branch = els.branch.value;

  let territorySubset = null;

  if (branch && branchTerritory[branch]) {
    territorySubset = branchTerritory[branch];
  }

  // Se c'? una filiale, i menu geografici vengono dalla competenza territoriale.
  // Se non c'? filiale, vengono dai record disponibili.
  const regionSource = territorySubset || records;

  fillSelect(els.region, optionList(regionSource.map(r => r.region)), "Tutte");

  const region = els.region.value;

  let provinceSource = regionSource;
  if (region) {
    provinceSource = provinceSource.filter(r => r.region === region);
  }

  fillSelect(els.province, optionList(provinceSource.map(r => r.province)), "Tutte");

  const province = els.province.value;

  let municipalitySource = regionSource;
  if (region) {
    municipalitySource = municipalitySource.filter(r => r.region === region);
  }
  if (province) {
    municipalitySource = municipalitySource.filter(r => r.province === province);
  }

  fillSelect(els.municipality, optionList(municipalitySource.map(r => r.municipality)), "Tutti");
}

function applyFilters() {
  currentPage = 1;
  const branch = els.branch.value;
  const region = els.region.value;
  const province = els.province.value;
  const municipality = els.municipality.value;
  const segment = els.segment.value;
  const contractorFilter = els.contractorFilter ? els.contractorFilter.value : "";
  const changeFilter = els.changeFilter ? els.changeFilter.value : "";
  const valueMin = Number(els.valueMin.value || 0);
  const valueMax = Number(els.valueMax.value || 0);
  const dateFrom = els.dateFrom.value;
  const dateTo = els.dateTo.value;
  const q = els.q.value.trim().toLowerCase();

  filtered = records.filter(r => {
    if (branch && !recordBranchList(r).includes(branch)) return false;
    if (region && r.region !== region) return false;
    if (province && r.province !== province) return false;
    if (municipality && r.municipality !== municipality) return false;
    if (segment && r.segment !== segment) return false;
    if (contractorFilter === "with" && !hasAnacContractor(r)) return false;
    if (contractorFilter === "without" && hasAnacContractor(r)) return false;
    if (changeFilter && String(r.change_status || "") !== changeFilter) return false;

    if (valueMin && Number(r.project_value || 0) < valueMin) return false;
    if (valueMax && Number(r.project_value || 0) > valueMax) return false;

    if (dateFrom && timelineSortTimestamp(r) < Date.parse(dateFrom + "T00:00:00Z")) return false;
    if (dateTo && timelineSortTimestamp(r) > Date.parse(dateTo + "T23:59:59Z")) return false;

    if (q) {
      const blob = [
        r.title, r.client, r.contractors, r.contractor_tax_codes,
        r.cup, r.cig, r.municipality, r.province, r.region,
        r.branch, r.branch_candidates
      ].join(" ").toLowerCase();
      if (!blob.includes(q)) return false;
    }

    return true;
  });

  render();
}



function cupYear(cup) {
  const c = clean(cup);
  if (c.length < 6) return "";
  const yy = c.substring(4, 6);
  if (!/^\d{2}$/.test(yy)) return "";
  const n = Number(yy);
  return n <= 40 ? String(2000 + n) : String(1900 + n);
}

function hasAnacData(r) {
  const awardsCount = Number(r.awards_count || 0);
  const awards = Array.isArray(r.awards) ? r.awards : [];
  return awardsCount > 0 || awards.length > 0;
}

function parseNum(v) {
  if (v === null || v === undefined) return 0;
  if (typeof v === "number") return v;
  const n = Number(String(v).replace(/[^\d,.-]/g, "").replace(/\./g, "").replace(",", "."));
  return Number.isFinite(n) ? n : 0;
}

function sortValue(r, key) {
  if (key === "timeline") return timelineSortTimestamp(r);
  if (key === "project_value") return Number(r.project_value || 0);
  if (key === "award_date") return clean(r.award_date);
  return clean(r[key]);
}


function setSort(key) {
  if (sortKey === key) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortKey = key;
    sortDir = (key === "project_value" || key === "award_date") ? "desc" : "asc";
  }

  updateSortHeaders();
  render();
}

function sortedFiltered() {
  const arr = [...filtered];
  arr.sort((a, b) => {
    const av = sortValue(a, sortKey);
    const bv = sortValue(b, sortKey);

    if (typeof av === "number" && typeof bv === "number") {
      return sortDir === "asc" ? av - bv : bv - av;
    }

    return sortDir === "asc"
      ? String(av).localeCompare(String(bv), "it", { sensitivity: "base" })
      : String(bv).localeCompare(String(av), "it", { sensitivity: "base" });
  });
  return arr;
}

function updateSortHeaders() {
  document.querySelectorAll("th.sortable").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.sort === sortKey) {
      th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
    }
  });
}

function exportFilteredCsv() {
  const rows = prSortedFiltered();

  if (!rows.length) {
    alert("Nessun record da esportare.");
    return;
  }

  const cols = [
    ["Progetto", r => clean(r.title)],
    ["Filiale", r => clean(r.branch)],
    ["Segmento", r => clean(r.segment)],
    ["Regione", r => clean(r.region)],
    ["Provincia", r => clean(r.province)],
    ["Comune", r => clean(r.municipality)],
    ["Valore progetto", r => clean(r.project_value)],
    ["Committente", r => clean(r.client)],
    ["Aggiudicatario / OE", r => clean(r.contractors)],
    ["Data aggiudicazione", r => clean(r.award_date)],
    ["Esito", r => clean(r.award_result)],
    ["Importo aggiudicazione", r => clean(r.award_amount_eur)],
    ["Peso affidamento", r => clean(r.award_weight)],
    ["CUP", r => clean(r.cup)],
    ["CIG", r => clean(r.cig)],
    ["Fonte", r => clean(r.source_url)]
  ];

  const esc = v => '"' + String(v ?? "").replaceAll('"', '""') + '"';
  const csv = [
    cols.map(c => esc(c[0])).join(";"),
    ...rows.map(r => cols.map(c => esc(c[1](r))).join(";"))
  ].join("\r\n");

  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "project_radar_risultati_filtrati.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function extractCupYear(record) {
  const direct = String(record.cup_year || "").trim();

  if (/^\d{4}$/.test(direct)) {
    return Number(direct);
  }

  const cup = String(record.cup || "").trim().toUpperCase();

  // CUP standard: il secondo/terzo carattere spesso codifica l'anno a 2 cifre.
  // Esempi visti: B21J23000170001 -> 2023, D72E23000410001 -> 2023
  const match = cup.match(/^[A-Z](\d{2})[A-Z0-9]/);

  if (match) {
    const yy = Number(match[1]);

    if (Number.isFinite(yy)) {
      return yy >= 80 ? 1900 + yy : 2000 + yy;
    }
  }

  // Fallback: cerca un anno esplicito nel testo, se presente.
  const explicit = cup.match(/(19|20)\d{2}/);
  if (explicit) {
    return Number(explicit[0]);
  }

  return 0;
}

function timelineSortTimestamp(record) {
  const awardDate = String(record.award_date || "").trim();

  if (/^\d{4}-\d{2}-\d{2}$/.test(awardDate)) {
    const ts = Date.parse(awardDate + "T00:00:00Z");
    if (Number.isFinite(ts)) return ts;
  }

  const year = extractCupYear(record);

  if (year) {
    return Date.parse(String(year) + "-01-01T00:00:00Z");
  }

  return 0;
}

function prSortValue(r, key) {
  if (key === "timeline") return timelineSortTimestamp(r);
  if (key === "project_value") {
    return Number(r.project_value || 0);
  }

  if (key === "award_date") {
    const d = clean(r.award_date);
    return d ? d : "";
  }

  return clean(r[key]).toLowerCase();
}

function prSortedFiltered() {
  return [...filtered].sort((a, b) => {
    const av = prSortValue(a, sortKey);
    const bv = prSortValue(b, sortKey);

    if (typeof av === "number" && typeof bv === "number") {
      return sortDir === "asc" ? av - bv : bv - av;
    }

    const cmp = String(av).localeCompare(String(bv), "it", {
      sensitivity: "base",
      numeric: true
    });

    return sortDir === "asc" ? cmp : -cmp;
  });
}

function setSort(key) {
  if (sortKey === key) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortKey = key;
    sortDir = (key === "project_value" || key === "award_date") ? "desc" : "asc";
  }

  updateSortHeaders();
  render();
}





function formatEuro(value) {
  const n = Number(String(value || "").replace(/\./g, "").replace(",", "."));
  if (!Number.isFinite(n) || n === 0) return "";
  return n.toLocaleString("it-IT", {
    style: "currency",
    currency: "EUR",
    maximumFractionDigits: 0
  });
}

function escapeAttr(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function splitContractorField(value) {
  const text = String(value || "").trim();

  if (!text) return [];

  return text
    .split(/\s+\|\s+|\n|<br\s*\/?>/i)
    .map(v => v.trim())
    .filter(Boolean);
}

function collectContractorItems(record) {
  const items = [];
  const seen = new Set();

  function addItem(name, taxCode) {
    const n = String(name || "").trim();
    const t = String(taxCode || "").trim();

    if (!n && !t) return;

    const key = `${n.toUpperCase()}|${t.toUpperCase()}`;

    if (seen.has(key)) return;

    seen.add(key);
    items.push({
      name: n || "Operatore economico non indicato",
      taxCode: t
    });
  }

  const awards = Array.isArray(record.awards) ? record.awards : [];

  awards.forEach(award => {
    if (!award || typeof award !== "object") return;

    const names = splitContractorField(
      award.contractors ||
      award.contractor_name ||
      award.aggiudicatario ||
      ""
    );

    const taxCodes = splitContractorField(
      award.contractor_tax_codes ||
      award.contractor_tax_code ||
      award.partita_iva ||
      award.codice_fiscale ||
      ""
    );

    const maxLen = Math.max(names.length, taxCodes.length);

    for (let i = 0; i < maxLen; i++) {
      addItem(names[i] || names[0] || "", taxCodes[i] || "");
    }
  });

  if (!items.length) {
    const names = splitContractorField(record.contractors || record.contractors_summary || "");
    const taxCodes = splitContractorField(record.contractor_tax_codes || "");

    const maxLen = Math.max(names.length, taxCodes.length);

    for (let i = 0; i < maxLen; i++) {
      addItem(names[i] || names[0] || "", taxCodes[i] || "");
    }
  }

  return items;
}

  if (String(record.contractors_summary || "").trim()) return true;

function ensurePagerElement() {
  let pager = document.getElementById("pagerControls");

  if (!pager) {
    pager = document.createElement("section");
    pager.id = "pagerControls";
    pager.className = "meta";
    pager.style.marginTop = "16px";

    const tableWrap = document.querySelector(".table-wrap");
    if (tableWrap && tableWrap.parentNode) {
      tableWrap.parentNode.insertBefore(pager, tableWrap.nextSibling);
    }
  }

  return pager;
}

function paginationWindow(totalPages) {
  const pages = [];

  if (totalPages <= 9) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
    return pages;
  }

  pages.push(1);

  const start = Math.max(2, currentPage - 2);
  const end = Math.min(totalPages - 1, currentPage + 2);

  if (start > 2) pages.push("...");

  for (let i = start; i <= end; i++) pages.push(i);

  if (end < totalPages - 1) pages.push("...");

  pages.push(totalPages);
  return pages;
}

function goToPage(page) {
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  currentPage = Math.min(Math.max(Number(page) || 1, 1), totalPages);
  render();
}

function updatePagerControls(totalFiltered, shownCount, startIndex, endIndex) {
  const pager = ensurePagerElement();
  if (!pager) return;

  if (!totalFiltered) {
    pager.innerHTML = `<div class="pill">Nessun risultato da visualizzare</div>`;
    return;
  }

  const totalPages = Math.max(1, Math.ceil(totalFiltered / pageSize));
  currentPage = Math.min(Math.max(currentPage, 1), totalPages);

  const pageButtons = paginationWindow(totalPages).map(p => {
    if (p === "...") {
      return `<span class="pill">...</span>`;
    }

    const activeStyle = p === currentPage
      ? `style="background:#0f766e;color:white;"`
      : "";

    return `<button type="button" ${activeStyle} onclick="goToPage(${p})">${p}</button>`;
  }).join("");

  pager.innerHTML = `
    <div class="pill">Pagina ${currentPage.toLocaleString("it-IT")} di ${totalPages.toLocaleString("it-IT")}</div>
    <div class="pill">Record ${startIndex.toLocaleString("it-IT")}-${endIndex.toLocaleString("it-IT")} di ${totalFiltered.toLocaleString("it-IT")}</div>
    <button type="button" onclick="goToPage(1)" ${currentPage === 1 ? "disabled" : ""}>Prima</button>
    <button type="button" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>Prec.</button>
    ${pageButtons}
    <button type="button" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Succ.</button>
    <button type="button" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? "disabled" : ""}>Ultima</button>
  `;
}

function render() {
  const sorted = prSortedFiltered();
  const totalFiltered = sorted.length;
  const totalPages = Math.max(1, Math.ceil(totalFiltered / pageSize));

  currentPage = Math.min(Math.max(currentPage, 1), totalPages);

  const startOffset = (currentPage - 1) * pageSize;
  const rows = sorted.slice(startOffset, startOffset + pageSize);

  const startIndex = totalFiltered ? startOffset + 1 : 0;
  const endIndex = Math.min(startOffset + rows.length, totalFiltered);

  els.total.textContent = "Record totali: " + records.length;
  els.shown.textContent = "Risultati filtrati: " + filtered.length + " - pagina " + currentPage + "/" + totalPages + " - mostrati: " + rows.length;
  updateAnacCoverageBadge();

  els.tbody.innerHTML = rows.map(r => `
    <tr>
      <td>
        <strong>${escapeHtml(r.title)}</strong>
        <small>CUP: ${escapeHtml(r.cup)} ${r.cig ? "- CIG: " + escapeHtml(r.cig) : ""}</small>
        ${r.has_anac ? '<span class="tag tag-anac">ANAC</span>' : '<span class="tag tag-open">OpenCUP</span>'}
        ${changeBadgesHtml(r)}
      </td>
      <td>${branchDisplayHtml(r)}</td>
      <td>${escapeHtml(r.segment)}</td>
      <td>${escapeHtml(r.region)}</td>
      <td>${escapeHtml(r.province)}</td>
      <td>${escapeHtml(r.municipality)}</td>
      <td>${formatEuro(r.project_value)}</td>
      <td>${escapeHtml(r.client)}</td>
      <td>${contractorsPreviewHtml(r)}</td>
      <td>
        <strong>${r.has_anac ? "Aggiudicazione:" : "CUP:"}</strong><br>
        ${escapeHtml(r.award_date || r.cup_year || "")}<br>
        <span>${escapeHtml(r.award_result || (r.has_anac ? "" : "Nessun match ANAC"))}</span>
      </td>
      <td>${r.source_url ? `<a href="${escapeAttr(r.source_url)}" target="_blank">Fonte</a>` : ""}</td>
    </tr>
  `).join("");

  updatePagerControls(totalFiltered, rows.length, startIndex, endIndex);
  updateSortHeaders();
}


function setSelectIfPresent(select, value) {
  if (!value) return;

  const decoded = decodeURIComponent(value).trim();
  if (!decoded) return;

  const options = Array.from(select.options);
  const found = options.find(o => o.value.toLowerCase() === decoded.toLowerCase());

  if (found) {
    select.value = found.value;
  }
}

function applyUrlParams() {
  const params = new URLSearchParams(window.location.search);

  const branch = params.get("branch");
  const region = params.get("region");
  const province = params.get("province");
  const municipality = params.get("municipality");
  const segment = params.get("segment");

  const valueMin = params.get("valueMin");
  const valueMax = params.get("valueMax");
  const dateFrom = params.get("dateFrom");
  const dateTo = params.get("dateTo");
  const q = params.get("q");

  // Ordine importante:
  // branch -> aggiorna territori
  // region -> aggiorna province/comuni
  // province -> aggiorna comuni
  setSelectIfPresent(els.branch, branch);
  updateDependentFilters();

  setSelectIfPresent(els.region, region);
  updateDependentFilters();

  setSelectIfPresent(els.province, province);
  updateDependentFilters();

  setSelectIfPresent(els.municipality, municipality);
  setSelectIfPresent(els.segment, segment);

  if (valueMin) els.valueMin.value = valueMin;
  if (valueMax) els.valueMax.value = valueMax;
  if (dateFrom) els.dateFrom.value = dateFrom;
  if (dateTo) els.dateTo.value = dateTo;
  if (q) els.q.value = decodeURIComponent(q);
}

}

function safeBranchSlug(value) {
  value = String(value || "").trim();

  if (!value) return "";

  const lowered = value.toLowerCase();

  if (lowered === "non assegnata" || lowered === "non_assegnata") return "NON_ASSEGNATA";
  if (lowered === "ambigua") return "AMBIGUA";

  return value
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^A-Za-z0-9]+/g, "_")
    .replace(/_+/g, "_")
    .replace(/^_+|_+$/g, "");
}

let branchIndex = null;
let currentShardEntry = null;
let indexOnlyMode = false;

function normalizeLoadedProjects(data) {
  if (Array.isArray(data)) return data;
  if (data && Array.isArray(data.projects)) return data.projects;
  if (data && Array.isArray(data.records)) return data.records;
  if (data && Array.isArray(data.items)) return data.items;
  if (data && Array.isArray(data.data)) return data.data;
  return [];
}

function findBranchEntry(value) {
  if (!branchIndex || !Array.isArray(branchIndex.branches)) return null;

  const raw = String(value || "").trim();
  const slug = safeBranchSlug(raw);

  return branchIndex.branches.find(b =>
    b.slug === raw ||
    b.slug === slug ||
    b.branch === raw ||
    safeBranchSlug(b.branch) === slug
  ) || null;
}

function ensureSelectOption(select, value) {
  if (!select || !value) return;

  const exists = Array.from(select.options).some(o => o.value === value);

  if (!exists) {
    const opt = document.createElement("option");
    opt.value = value;
    opt.textContent = value;
    select.appendChild(opt);
  }

  select.value = value;
}

function populateBranchFilterFromIndex(index) {
  if (!index || !Array.isArray(index.branches)) return;

  const branches = index.branches
    .map(x => x.branch)
    .filter(Boolean)
    .sort((a, b) => a.localeCompare(b, "it"));

  els.branch.innerHTML = "";

  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = "Seleziona una filiale";
  els.branch.appendChild(placeholder);

  for (const branch of branches) {
    const opt = document.createElement("option");
    opt.value = branch;
    opt.textContent = branch;
    els.branch.appendChild(opt);
  }

  els.branch.value = "";
}

function renderIndexOnlyMessage(index) {
  indexOnlyMode = true;

  const totalBranches = index && Array.isArray(index.branches) ? index.branches.length : 0;
  const totalRecords = index && index.unique_records ? Number(index.unique_records) : 0;

  if (els.total) {
    els.total.textContent = totalRecords
      ? `Archivio nazionale indicizzato: ${totalRecords.toLocaleString("it-IT")} record`
      : "Archivio nazionale indicizzato per filiale";
  }

  const anacCoverage = document.getElementById("anacCoverage");
  if (anacCoverage) {
    anacCoverage.textContent = "";
  }

  if (els.shown) {
    els.shown.textContent = totalBranches
      ? `${totalBranches} filiali disponibili`
      : "Scegli una filiale";
  }

  const tbody = document.getElementById("tbody") || document.querySelector("tbody");

  if (tbody) {
    tbody.innerHTML = `
      <tr>
        <td colspan="12" class="muted">
          Archivio completo diviso per filiale. Seleziona una filiale dal menu oppure usa la pagina Filiali.
          ${totalBranches ? `<br>${totalBranches} shard logici disponibili.` : ""}
        </td>
      </tr>
    `;
  }
}

function loadBranchIndex() {
  return fetch("data/branches/index.json").then(r => {
    if (!r.ok) throw new Error("Indice shard non trovato: data/branches/index.json");
    return r.json();
  });
}

function loadShardFiles(entry) {
  const files = Array.isArray(entry.files) && entry.files.length
    ? entry.files.map(f => f.file)
    : [`${entry.slug}.json`];

  return Promise.all(
    files.map(file =>
      fetch(`data/branches/${encodeURIComponent(file)}`).then(r => {
        if (!r.ok) throw new Error(`Shard non trovato: ${file}`);
        return r.json();
      })
    )
  ).then(parts => {
    const all = [];

    for (const part of parts) {
      all.push(...normalizeLoadedProjects(part));
    }

    return all;
  });
}

function loadSearchData() {
  const params = new URLSearchParams(window.location.search);
  const branchParam = params.get("branch");

  return Promise.all([
    loadBranchIndex(),
    fetch("data/branch_territory.json").then(r => r.json())
  ]).then(([index, territory]) => {
    branchIndex = index;
    branchTerritory = territory;

    if (!branchParam) {
      records = [];
      filtered = [];
      populateBranchFilterFromIndex(index);
      renderIndexOnlyMessage(index);
      return;
    }

    const entry = findBranchEntry(branchParam);

    if (!entry) {
      throw new Error(`Filiale non trovata nell'indice shard: ${branchParam}`);
    }

    currentShardEntry = entry;
    indexOnlyMode = false;

    return loadShardFiles(entry).then(projects => {
      records = projects;
      filtered = projects;

      populateFilters();
      ensureSelectOption(els.branch, entry.branch);
      applyUrlParams();
      ensureSelectOption(els.branch, entry.branch);
      applyFilters();
    });
  });
}

function showLoadError(err) {
  console.error(err);

  if (els.total) {
    els.total.textContent = "Errore caricamento dati";
  }

  if (els.shown) {
    els.shown.textContent = err.message || String(err);
  }

  const tbody = document.getElementById("tbody") || document.querySelector("tbody");

  if (tbody) {
    tbody.innerHTML = `
      <tr>
        <td colspan="12" class="muted">
          Errore caricamento dati: ${escapeHtml(err.message || String(err))}
        </td>
      </tr>
    `;
  }
}

loadSearchData().catch(showLoadError);

</script>
<script id="salerno-ui-normalizer">
(function () {
  const RAW = "SALERNO";
  const DISPLAY = "Salerno";

  function isSalerno(value) {
    return String(value || "").trim().toUpperCase() === RAW;
  }

  function fixSelectOptions() {
    document.querySelectorAll("select option").forEach(option => {
      if (isSalerno(option.value) || isSalerno(option.textContent)) {
        option.value = RAW;
        option.textContent = DISPLAY;
      }
    });

    document.querySelectorAll("select").forEach(select => {
      if (isSalerno(select.value)) {
        select.value = RAW;
      }
    });
  }

  function fixTextNodes(root) {
    const walker = document.createTreeWalker(
      root || document.body,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode(node) {
          const parent = node.parentElement;
          if (!parent) return NodeFilter.FILTER_REJECT;
          if (["SCRIPT", "STYLE", "TEXTAREA"].includes(parent.tagName)) {
            return NodeFilter.FILTER_REJECT;
          }
          return node.nodeValue.includes(RAW)
            ? NodeFilter.FILTER_ACCEPT
            : NodeFilter.FILTER_REJECT;
        }
      }
    );

    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);

    nodes.forEach(node => {
      node.nodeValue = node.nodeValue.replaceAll(RAW, DISPLAY);
    });
  }

  function fixLinks() {
    document.querySelectorAll("a[href]").forEach(a => {
      const href = a.getAttribute("href") || "";

      // Il link deve continuare a puntare al valore tecnico SALERNO.
      // Cambiamo solo il testo visibile.
      if (isSalerno(a.textContent)) {
        a.textContent = DISPLAY;
      }

      if (href.includes("branch=Salerno")) {
        a.setAttribute("href", href.replace("branch=Salerno", "branch=SALERNO"));
      }
    });
  }

  function run() {
    fixSelectOptions();
    fixTextNodes(document.body);
    fixLinks();
  }

  window.addEventListener("DOMContentLoaded", run);
  window.addEventListener("load", run);
  setTimeout(run, 250);
  setTimeout(run, 1000);

  const observer = new MutationObserver(() => {
    window.requestAnimationFrame(run);
  });

  observer.observe(document.documentElement, {
    childList: true,
    subtree: true
  });
})();
</script>


<script id="change-url-param-loader">
(function () {
  function applyChangeParam() {
    const params = new URLSearchParams(window.location.search);
    const change = params.get("change");

    if (!change) return;

    const select = document.getElementById("changeFilter");
    if (!select) return;

    const allowed = Array.from(select.options).some(option => option.value === change);
    if (!allowed) return;

    if (select.value !== change) {
      select.value = change;
    }

    if (typeof applyFilters === "function") {
      applyFilters();
    }
  }

  window.addEventListener("load", () => {
    setTimeout(applyChangeParam, 100);
    setTimeout(applyChangeParam, 500);
    setTimeout(applyChangeParam, 1200);
  });
})();
</script>


<script id="commercial-csv-export">
(function () {
  function csvClean(value) {
    return String(value ?? "")
      .replace(/\r?\n|\r/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function csvCell(value) {
    const text = csvClean(value);
    return `"${text.replace(/"/g, '""')}"`;
  }

  function toNumber(value) {
    const n = Number(value || 0);
    return Number.isFinite(n) ? n : 0;
  }

  function formatThousands(value) {
    const n = Math.round(toNumber(value));
    return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  }

  function formatEuro(value) {
    const n = toNumber(value);
    if (!n) return "";
    return `${formatThousands(n)} €`;
  }

  function fallbackSplit(value) {
    return String(value || "")
      .split(/\s+\|\s+|\n|<br\s*\/?>/i)
      .map(v => v.trim())
      .filter(Boolean);
  }

  function exportContractorItems(record) {
    if (typeof collectContractorItems === "function") {
      return collectContractorItems(record);
    }

    const names = fallbackSplit(record.contractors || record.contractors_summary || "");
    const taxCodes = fallbackSplit(record.contractor_tax_codes || "");
    const maxLen = Math.max(names.length, taxCodes.length);
    const items = [];

    for (let i = 0; i < maxLen; i++) {
      items.push({
        name: names[i] || names[0] || "",
        taxCode: taxCodes[i] || ""
      });
    }

    return items.filter(item => item.name || item.taxCode);
  }

  function sourceLabel(record) {
    if (record.has_anac || String(record.source || "").toUpperCase().includes("ANAC")) {
      return "ANAC";
    }

    return "OpenCUP";
  }

  function timelineLabel(record) {
    const awardDate = String(record.award_date || "").trim();

    if (awardDate) {
      const result = String(record.award_result || "").trim();
      return result ? `Aggiudicazione: ${awardDate} - ${result}` : `Aggiudicazione: ${awardDate}`;
    }

    const year = typeof extractCupYear === "function" ? extractCupYear(record) : String(record.cup_year || "").trim();

    if (year) {
      return `CUP: ${year}`;
    }

    return "";
  }

  function changeLabel(record) {
    const status = String(record.change_status || "").trim();

    if (status === "new") return "Nuovo nel radar";
    if (status === "updated") return "Aggiornato";
    if (status === "anac_added") return "ANAC aggiunto";

    const badges = Array.isArray(record.change_badges) ? record.change_badges : [];
    return badges.join(" | ");
  }

  function exportRowsForCsv() {
    if (typeof prSortedFiltered === "function") {
      return prSortedFiltered();
    }

    if (Array.isArray(window.records)) {
      return window.records;
    }

    if (Array.isArray(window.allRecords)) {
      return window.allRecords;
    }

    throw new Error("Non trovo i record filtrati da esportare.");
  }

  function buildCommercialCsv() {
    const rows = exportRowsForCsv();

    const headers = [
      "Filiale",
      "Segmento",
      "Regione",
      "Provincia",
      "Comune",
      "Titolo progetto",
      "Valore progetto",
      "Committente",
      "Aggiudicatari / OE",
      "P.IVA/CF aggiudicatari",
      "Numero OE",
      "Timeline",
      "Fonte dati",
      "CUP",
      "CIG",
      "Novità ultimo aggiornamento",
      "Link fonte"
    ];

    const lines = [];
    lines.push(headers.map(csvCell).join(";"));

    rows.forEach(record => {
      const contractors = exportContractorItems(record);
      const contractorNames = contractors.map(item => item.name).filter(Boolean).join(" | ");
      const contractorTaxCodes = contractors.map(item => item.taxCode).filter(Boolean).join(" | ");

      const line = [
        record.branch,
        record.segment || record.primary_segment,
        record.region,
        record.province,
        record.municipality,
        record.title,
        formatEuro(record.project_value),
        record.client,
        contractorNames,
        contractorTaxCodes,
        contractors.length ? contractors.length : "",
        timelineLabel(record),
        sourceLabel(record),
        record.cup,
        record.cig,
        changeLabel(record),
        record.source_url || record.url
      ];

      lines.push(line.map(csvCell).join(";"));
    });

    return lines.join("\r\n");
  }

  function filenameForExport() {
    const params = new URLSearchParams(window.location.search);
    const branchSelect = document.getElementById("branchFilter");
    const branch = params.get("branch") || (branchSelect ? branchSelect.value : "") || "nazionale";
    const stamp = new Date().toISOString().slice(0, 10);
    const safeBranch = String(branch)
      .replace(/[^a-z0-9_-]+/gi, "_")
      .replace(/^_+|_+$/g, "");

    return `project_radar_${safeBranch}_${stamp}.csv`;
  }

  function downloadCommercialCsv() {
    const csv = buildCommercialCsv();
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = filenameForExport();
    document.body.appendChild(link);
    link.click();
    link.remove();

    URL.revokeObjectURL(url);
  }

  function isExportElement(el) {
    if (!el) return false;
    const candidate = el.closest ? el.closest("button, a") : null;
    return candidate && String(candidate.textContent || "").trim().toLowerCase().includes("export csv");
  }

  function bindCommercialExportButton() {
    const candidates = Array.from(document.querySelectorAll("button, a"))
      .filter(el => String(el.textContent || "").trim().toLowerCase().includes("export csv"));

    candidates.forEach(button => {
      button.removeAttribute("onclick");
      button.title = "Esporta tutti i risultati filtrati con colonne commerciali pulite.";
    });
  }

  // Intercetta il click in capture phase: batte anche eventuali vecchi handler.
  document.addEventListener("click", event => {
    if (!isExportElement(event.target)) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    try {
      downloadCommercialCsv();
    } catch (err) {
      console.error(err);
      alert("Errore durante l'export CSV: " + err.message);
    }
  }, true);

  window.downloadCommercialCsv = downloadCommercialCsv;

  window.addEventListener("load", () => {
    setTimeout(bindCommercialExportButton, 100);
    setTimeout(bindCommercialExportButton, 700);
    setTimeout(bindCommercialExportButton, 1500);
  });
})();
</script>
