name: Build OpenCUP Radar

on:
  workflow_dispatch:
    inputs:
      opencup_url:
        description: "URL diretto dello ZIP OpenCUP CSV"
        required: true
        type: string
      min_value:
        description: "Valore minimo progetto in euro"
        required: false
        default: "200000"
        type: string
      dashboard_limit:
        description: "Numero record da mostrare in dashboard"
        required: false
        default: "120"
        type: string
      commit_outputs:
        description: "Committa docs/ e reports operativi nella repo"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Snapshot previous branch shards
        run: |
          rm -rf tmp/previous_branches
          mkdir -p tmp/previous_branches
          if [ -d docs/data/branches ]; then
            cp -R docs/data/branches/. tmp/previous_branches/
          fi
          find tmp/previous_branches -maxdepth 1 -name "*.json" | wc -l

      - name: Download ANAC raw datasets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/raw/anac
          gh release download anac-raw-2026 --pattern "cup.zip" --dir data/raw/anac --clobber
          gh release download anac-raw-2026 --pattern "aggiudicatari.zip" --dir data/raw/anac --clobber
          gh release download anac-raw-2026 --pattern "aggiudicazioni.zip" --dir data/raw/anac --clobber
          ls -lh data/raw/anac

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb

      - name: Build OpenCUP radar
        env:
          OPENCUP_URL: ${{ inputs.opencup_url }}
          MIN_PROJECT_VALUE_EUR: ${{ inputs.min_value }}
          DASHBOARD_LIMIT: ${{ inputs.dashboard_limit }}
        run: |
          python -u scripts/build_opencup_cloud.py

      - name: Build operational view from OpenCUP reports
        run: |
          python -u scripts/build_operational_from_reports.py
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("docs/data.json")
          if not p.exists():
              raise SystemExit("ERRORE: docs/data.json non generato")

          data = json.loads(p.read_text(encoding="utf-8"))

          total = int(data.get("total_candidates") or 0)
          shown = int(data.get("dashboard_count") or 0)

          print(f"[Validation] total_candidates={total} dashboard_count={shown}")

          if total <= 0 or shown <= 0:
              raise SystemExit("ERRORE: output vuoto, blocco commit")
          PY


      - name: Promote operational shortlist to national dataset
        run: |
          python -u scripts/promote_operational_to_national.py

      - name: Prepare ANAC CUP targets
        run: |
          python -u scripts/national_prepare_anac_targets.py

      - name: Match ANAC CUP-CIG
        run: |
          python -u scripts/national_match_anac_cup_cig.py

      - name: Prepare ANAC CIG targets
        run: |
          python -u scripts/national_prepare_anac_cig_targets.py

      - name: Match ANAC CIG-aggiudicatari
        run: |
          python -u scripts/national_match_anac_aggiudicatari.py

      - name: Match ANAC aggiudicazioni
        run: |
          python -u scripts/national_match_anac_aggiudicazioni.py

      - name: Build ANAC relevant awards
        run: |
          python -u scripts/national_build_anac_relevant_awards.py

      - name: Build grouped master dataset
        run: |
          python -u scripts/build_master_dataset.py

      - name: Build branch shards
        run: |
          python -u scripts/build_branch_shards.py --input reports/master_projects.json

      - name: Apply monthly delta badges
        run: |
          python -u scripts/apply_monthly_delta.py --previous tmp/previous_branches --current docs/data/branches --manifest docs/data/update_manifest.json

      - name: Build homepage stats
        run: |
          python -u scripts/build_home_stats.py

      - name: Set public homepage
        run: |
          cp docs/home.html docs/index.html
          test -s docs/index.html

      - name: Guard generated outputs
        run: |
          python - <<'PY'
          import csv
          import json
          import sys
          from pathlib import Path

          errors = []

          def csv_count(path):
              with path.open("r", encoding="utf-8-sig", newline="") as f:
                  return max(sum(1 for _ in f) - 1, 0)

          def load_projects(path):
              data = json.loads(path.read_text(encoding="utf-8"))
              if isinstance(data, list):
                  return data
              for key in ("projects", "records", "items", "data", "rows"):
                  if isinstance(data.get(key), list):
                      return data[key]
              return []

          def clean(v):
              return str(v or "").strip()

          def has_contractor(r):
              if clean(r.get("contractors")) or clean(r.get("contractor_tax_codes")) or clean(r.get("contractors_summary")):
                  return True
              awards = r.get("awards")
              if isinstance(awards, list):
                  return any(
                      clean(a.get("contractors")) or clean(a.get("contractor_tax_codes")) or clean(a.get("contractor_name")) or clean(a.get("contractor_tax_code"))
                      for a in awards
                      if isinstance(a, dict)
                  )
              return False

          index_path = Path("docs/data/branches/index.json")
          if not index_path.exists():
              errors.append("Manca docs/data/branches/index.json")
          else:
              idx = json.loads(index_path.read_text(encoding="utf-8"))
              unique_records = int(idx.get("unique_records") or 0)
              warnings = idx.get("warnings") or []

              print("unique_records:", unique_records)
              print("warnings:", warnings)

              if unique_records < 400000:
                  errors.append(f"unique_records troppo basso: {unique_records}")

              if warnings:
                  errors.append(f"Warnings shard presenti: {warnings}")

          branch_dir = Path("docs/data/branches")
          for p in branch_dir.glob("*.json"):
              mb = p.stat().st_size / 1024 / 1024
              if mb >= 95:
                  errors.append(f"Shard troppo grande: {p} = {mb:.2f} MB")

          relevant = Path("reports/national_anac_relevant_awards.csv")
          if not relevant.exists():
              errors.append("Manca reports/national_anac_relevant_awards.csv")
          else:
              relevant_rows = csv_count(relevant)
              print("national_anac_relevant_awards rows:", relevant_rows)
              if relevant_rows < 100000:
                  errors.append(f"ANAC relevant troppo basso: {relevant_rows}")

          lucca = Path("docs/data/branches/Lucca.json")
          if lucca.exists():
              rows = load_projects(lucca)
              with_contractor = sum(1 for r in rows if has_contractor(r))
              print("Lucca totale:", len(rows))
              print("Lucca con aggiudicatario:", with_contractor)

              if len(rows) >= 6000 and with_contractor < 1000:
                  errors.append(f"Copertura ANAC Lucca sospetta: {with_contractor}/{len(rows)}")

          if errors:
              print("")
              print("ERRORI GUARD:")
              for e in errors:
                  print("-", e)
              sys.exit(1)

          print("OK: guard output superato.")
          PY

      - name: Upload generated files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-radar-output
          path: |
            docs/data.json
            docs/index.html
            docs/data/branches/index.json
            docs/data/branches/*.json
            reports/top_projects.csv
            reports/operational_by_segment.csv
            reports/national_operational_by_segment.csv

      - name: Commit generated outputs
        if: ${{ inputs.commit_outputs }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data.json docs/index.html docs/home.html docs/data/home_stats.json reports/top_projects.csv || true
          git add docs/operational.html docs/operational_data.json reports/operational_by_segment.csv || true
          git add reports/national_operational_by_segment.csv docs/national_operational.html || true
          git add -A docs/data/branches || true
          git diff --cached --quiet || git commit -m "Update OpenCUP radar outputs"
          git push
